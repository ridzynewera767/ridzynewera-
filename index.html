<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You </title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#090011,#18001f,#240029);
overflow:hidden;
height:100vh;
color:white;
}

.slide{
display:none;
width:100%;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:30px;
}

.active{
display:flex;
}

.bloom{
font-size:120px;
animation:bloom 2s infinite alternate;
}

@keyframes bloom{
from{
transform:scale(.8);
}
to{
transform:scale(1.2);
}
}

.openBtn{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
background:#ff4fa1;
color:white;
box-shadow:0 0 20px #ff4fa1;
}

#typing{
max-width:700px;
font-size:24px;
line-height:1.8;
}

.photo{
width:250px;
height:250px;
object-fit:cover;
border-radius:20px;
border:5px solid #ff4fa1;
box-shadow:0 0 30px #ff4fa1;
margin-bottom:25px;
}

.nextBtn{
margin-top:25px;
padding:12px 35px;
border:none;
border-radius:50px;
background:#ff4fa1;
color:white;
cursor:pointer;
}

#love{
.love-container{
display:flex;
flex-direction:column;
align-items:center;
animation:fadeIn 2s ease;
}

.love-small{
font-size:20px;
letter-spacing:4px;
text-transform:uppercase;
opacity:.7;
margin-bottom:20px;
}

#love{
font-family:'Brush Script MT',cursive;
font-size:110px;
font-weight:normal;

background:linear-gradient(
45deg,
#ffb6d9,
#ff4fa1,
#ffd1e8,
#ff4fa1
);

background-size:300% 300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
gradientMove 4s infinite,
floatingLove 3s ease-in-out infinite;
}

.love-heart{
font-size:60px;
margin-top:-10px;
animation:heartbeat 1.3s infinite;
}

.love-sub{
margin-top:20px;
font-size:24px;
font-style:italic;
opacity:.85;
letter-spacing:2px;
}

@keyframes gradientMove{
0%{
background-position:0% 50%;
}
50%{
background-position:100% 50%;
}
100%{
background-position:0% 50%;
}
}

@keyframes floatingLove{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}

@keyframes heartbeat{
0%,100%{
transform:scale(1);
}
25%{
transform:scale(1.15);
}
50%{
transform:scale(1.3);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes pulse{
50%{
transform:scale(1.15);
}
}

.forever{
margin-top:20px;
font-size:28px;
opacity:.9;
}

.butterfly{
.butterfly{
position:absolute;
z-index:5;
pointer-events:none;

animation:
butterflyFly linear forwards,
wingFloat 2s ease-in-out infinite;
}

.butterfly img{
width:55px;
filter:
drop-shadow(0 0 10px rgba(255,255,255,.6));
}

@keyframes wingFloat{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-15px);
}

}

@keyframes butterflyFly{

0%{
transform:
translateY(110vh)
translateX(0);
opacity:0;
}

15%{
opacity:1;
}

25%{
transform:
translateY(85vh)
translateX(60px);
}

50%{
transform:
translateY(50vh)
translateX(-70px);
}

75%{
transform:
translateY(20vh)
translateX(80px);
}

100%{
transform:
translateY(-150px)
translateX(0);
opacity:0;
}

}
.paper{
position:relative;
width:85%;
max-width:700px;
padding:50px;
background:#fff8e7;
color:#333;

border-radius:5px;

box-shadow:
0 10px 30px rgba(0,0,0,.3);

font-family:'Courier New',cursive;

line-height:2;

overflow:hidden;

animation:paperShow 1.5s ease;
}

/* Sobekan atas */
.paper::before{
content:"";
position:absolute;
top:-15px;
left:0;
width:100%;
height:30px;

background:
radial-gradient(circle at 10px 15px,
transparent 12px,
#fff8e7 13px);

background-size:30px 30px;
}

/* Sobekan bawah */
.paper::after{
content:"";
position:absolute;
bottom:-15px;
left:0;
width:100%;
height:30px;

background:
radial-gradient(circle at 10px 15px,
transparent 12px,
#fff8e7 13px);

background-size:30px 30px;
transform:rotate(180deg);
}

@keyframes paperShow{
from{
opacity:0;
transform:translateY(50px) rotate(-5deg);
}
to{
opacity:1;
transform:translateY(0) rotate(0);
}
}
  .flower-wrapper{
position:relative;
display:flex;
justify-content:center;
align-items:center;
margin-top:40px;
margin-bottom:30px;
}

.main-flower{
width:320px;
opacity:0;

filter:
drop-shadow(0 0 20px rgba(173,216,255,.7))
drop-shadow(0 0 40px rgba(173,216,255,.5));

animation:
flowerAppear 2.5s ease forwards,
flowerFloat 5s ease-in-out infinite 2.5s;
}

.flower-glow{
position:absolute;
width:220px;
height:220px;
border-radius:50%;

background:
radial-gradient(
circle,
rgba(173,216,255,.35),
transparent 70%
);

animation:
glowPulse 4s infinite;
}

@keyframes flowerAppear{

0%{
opacity:0;
transform:
translateY(180px)
scale(.3)
rotate(-15deg);
}

60%{
opacity:1;
transform:
translateY(-10px)
scale(1.08)
rotate(3deg);
}

100%{
opacity:1;
transform:
translateY(0)
scale(1)
rotate(0deg);
}

}

@keyframes flowerFloat{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

}

@keyframes glowPulse{

0%,100%{
transform:scale(1);
opacity:.5;
}

50%{
transform:scale(1.25);
opacity:.9;
}

}
  .gift-title{
font-size:72px;
font-family:cursive;
font-weight:300;

color:#ffe1f5;

text-shadow:
0 0 10px #ffd6f2,
0 0 30px #ff9cd6;

animation:titleFade 2s ease;
}

.gift-sub{
letter-spacing:5px;
text-transform:uppercase;
opacity:.7;
margin-top:10px;
}
</style>
</head>
<body>

<audio autoplay loop>
<source src="ssstik.io_1780299665921.mp3" type="audio/mpeg">
</audio>

<!-- Slide 1 -->
<div class="slide active" id="slide1">

<div class="flower-wrapper">
  
<img src="file_000000006c9c7208b6def9b85fd09e05.png" class="butterfly-test">
  
    <div class="flower-glow"></div>

    <img src="file_000000007688720892dc4fa60c4d040b.png" class="main-flower">

</div>

<button class="openBtn" onclick="openLetter()">
OPEN >
</button>

</div>

<!-- Slide 2 -->
<div class="paper">

<div id="typing"></div>

</div>

<button class="nextBtn" onclick="goSlide3()">
NEXT >
</button>

</div>

<!-- Slide 3 -->
<div class="slide" id="slide3">

<img src="IMG-20260526-WA0101.jpg" class="photo">

<h2>
Kamu cantik (klo lgi ga marah)
</h2>

<p style="margin-top:15px;font-size:20px;">
Jangan terlalu keras pada dirimu ya.
Aku selalu mendoakan yang terbaik untukmu.
  Butuh king parid, gw disini kok santai aja

</p>

<button class="nextBtn" onclick="goSlide4()">

</div>

<!-- Slide 4 -->
<div class="slide" id="slide4">

<div class="love-container">

<div class="love-small">
and one more thing...
</div>

<div id="love">
I Love You
</div>

<div class="love-heart">

</div>

<div class="love-sub">
more than words can explain
</div>

</div>

<div class="forever">
Forever & Always
</div>

</div>

<script>

const message = `

Hai buyancu

Aku cuma mau bilang makasih
karena sudah hadir dan memberi
banyak warna dalam hariku.

Semoga kamu selalu bahagia,
sehat, dan dikelilingi hal-hal baik.

🤍

`;

let i = 0;

function openLetter(){

document.getElementById('slide1').classList.remove('active');
document.getElementById('slide2').classList.add('active');

typeWriter();

}

function typeWriter(){

if(i < message.length){

document.getElementById("typing").innerHTML += message.charAt(i);

i++;

setTimeout(typeWriter,40);

}

}

function goSlide3(){

document.getElementById('slide2').classList.remove('active');
document.getElementById('slide3').classList.add('active');

}

function goSlide4(){

document.getElementById('slide3').classList.remove('active');
document.getElementById('slide4').classList.add('active');

}
function createButterfly(){

const butterfly =
document.createElement("div");

butterfly.className = "butterfly";

const images = [
"butterfly1.png",
"butterfly2.png",
"butterfly3.png"
];

const randomImage =
images[Math.floor(Math.random()*images.length)];

butterfly.innerHTML =
`<img src="${randomImage}" width="55">`;

butterfly.style.left =
Math.random()*100 + "vw";

butterfly.style.animationDuration =
(Math.random()*6 + 7) + "s";

document.body.appendChild(butterfly);

setTimeout(()=>{
butterfly.remove();
},14000);

}

setInterval(createButterfly,700);

b.style.left =
Math.random()*100+"vw";

b.style.animationDuration =
(Math.random()*5+5)+"s";

document.body.appendChild(b);

setTimeout(()=>{
b.remove();
},10000);

}

setInterval(butterfly,350);
function createSparkle(){

const sparkle =
document.createElement("div");

sparkle.classList.add("sparkle");

sparkle.style.left =
(Math.random()*250-125)+"px";

sparkle.style.top =
(Math.random()*250-125)+"px";

document
.querySelector(".flower-wrapper")
.appendChild(sparkle);

setTimeout(()=>{
sparkle.remove();
},3000);

}

setInterval(createSparkle,300);
</script>

</body>
  </html>
