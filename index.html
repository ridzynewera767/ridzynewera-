<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
  
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Poppins", sans-serif;
}

body{
    overflow:hidden;
    background: radial-gradient(circle at center,#120018,#000);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Hati berjatuhan */
.heart{
    position:absolute;
    color:#ff4d88;
    font-size:20px;
    animation: fall linear infinite;
    opacity:.8;
}

@keyframes fall{
    0%{
        transform:translateY(-100px);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(110vh);
        opacity:0;
    }
}

/* Kotak pesan */
.card{
    width:85%;
    max-width:700px;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:0 0 30px rgba(255,0,128,.25);
    color:white;
    position:relative;
}

.card::before{
    content:"";
    position:absolute;
    left:15px;
    top:15px;
    bottom:15px;
    width:2px;
    background:#ff4d88;
}

#text{
    font-size:1.4rem;
    line-height:1.8;
    padding-left:20px;
    min-height:120px;
}

.title{
    text-align:center;
    margin-bottom:20px;
    color:#ff7eb6;
    font-size:2rem;
}.foto{
    width:190px;
    height:190px;
    object-fit:cover;
    border-radius:50%;
    display:block;
    margin:0 auto 20px;
    border:5px solid #ff4d88;
    box-shadow:
    0 0 20px #ff4d88,
    0 0 40px #ff4d88,
    0 0 60px #ff4d88;
    animation:fotopulse 2s infinite;
}

@keyframes fotopulse{
    50%{
        transform:scale(1.05);
    }
}

#love{
    display:none;
    text-align:center;
    margin-top:25px;
    font-size:2.5rem;
    font-weight:900;
    color:#ff4d88;
    text-shadow:
    0 0 10px #ff4d88,
    0 0 20px #ff4d88,
    0 0 40px #ff4d88;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.15);
    }
}

.card{
    animation:fadeUp 2s;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="card">
    <div class="title">💖 For Bulan 💖</div>
    <div id="text"></div>
</div>

<audio autoplay loop>
    <source src="love.mp3" type="audio/mpeg">
</audio>

<script>

// Efek hati berjatuhan
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="💖";

    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=
    (Math.random()*5+4)+"s";

    heart.style.fontSize=
    (Math.random()*20+15)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },9000);
}

setInterval(createHeart,250);

// Efek mengetik
const message=`

Thank you for being such a strong and amazing person.

Aku bangga sama kamu.

Terima kasih karena selalu bertahan sejauh ini.

Kalau hari ini terasa berat,
ingat ya...

kamu tidak sendirian ❤️

`;

let i=0;
  
function typeWriter(){
    if(i<message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }else{
        document.getElementById("love").style.display="block";

        for(let x=0;x<40;x++){
            setTimeout(createHeart,x*150);
        }
    }
}
typeWriter();

</script>

</body>
</html>
